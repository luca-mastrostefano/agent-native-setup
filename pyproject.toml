[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-project-setup"
version = "0.1.0"
description = "Wizard that scaffolds an AI-native project setup (AGENTS.md/CLAUDE.md, agents, docs/RFCs, linters, CI)."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "questionary>=2.0",
    "jinja2>=3.1",
    "rich>=13.0",
]

[project.scripts]
ai-setup = "ai_setup.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_setup"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "RUF"]

[tool.ruff.lint.per-file-ignores]
# Generators hold markdown/YAML templates as string literals; long content
# lines (e.g. the verbatim execution principles) are intentional.
"src/ai_setup/generators/*" = ["E501"]
