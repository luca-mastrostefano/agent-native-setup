version: "3"

tasks:
  install:
    desc: install git hooks
    cmds:
      - pre-commit install
  lint:
    desc: run linters
    cmds:
      - ruff check .
  format:
    desc: auto-format
    cmds:
      - ruff format .
  typecheck:
    desc: type-check
    cmds:
      - mypy .
  test:
    desc: run tests
    cmds:
      - pytest
      - python -m unittest discover -s tools/checks
  quality:
    desc: full local gate
    deps: [lint, typecheck, test]
    cmds:
      - echo "quality gate passed"
  rfc-sync:
    desc: move RFCs into the folder matching their Status
    cmds:
      - python tools/checks/sync_rfc_status.py
  improvement:
    desc: append a commit+date-stamped idea to docs/improvements.md (task improvement -- "<idea>")
    cmds:
      - sha=$(git rev-parse --short HEAD 2>/dev/null); echo "- [${sha:+$sha · }$(date +%F)] {{.CLI_ARGS}}" >> docs/improvements.md
  release:
    desc: 'cut a release (tag + GitHub release) — usage: task release VERSION=0.2.0'
    cmds:
      - gh release create "v{{.VERSION}}" --title "v{{.VERSION}}" --generate-notes
