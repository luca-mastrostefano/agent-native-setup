name: quality
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install ruff
      - run: ruff check .
      - run: ruff format --check .
      - run: python -m pip install -e . pytest
      - run: pytest
