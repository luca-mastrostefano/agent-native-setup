default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=4096]
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
  - repo: https://github.com/Mateusz-Grzelinski/actionlint-py
    rev: v1.7.12.24
    hooks:
      - id: actionlint
        files: ^\.github/workflows/
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
  - repo: local
    hooks:
      - id: rfc-status
        name: rfc status -> folder sync
        entry: python tools/checks/sync_rfc_status.py
        language: system
        pass_filenames: false
        files: ^docs/rfc/.*\.md$
      - id: rfc-needed
        name: RFC needed for structural changes
        entry: python tools/checks/rfc_needed.py
        language: system
        stages: [commit-msg]  # the commit message file is passed as the argument
      - id: docs-sync
        name: architecture docs for new components
        entry: python tools/checks/docs_sync.py
        language: system
        stages: [commit-msg]  # the commit message file is passed as the argument
      - id: tests-needed
        name: tests accompany code changes
        entry: python tools/checks/tests_needed.py
        language: system
        stages: [commit-msg]  # the commit message file is passed as the argument
  - repo: local
    hooks:
      # env -u … scrubs git's GIT_DIR/GIT_WORK_TREE/GIT_INDEX_FILE (exported into every
      # hook); without it, tests that `git init` a temp dir would operate on THIS repo.
      - id: python-tests
        name: Python tests (pre-push)
        entry: env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      - id: tools-checks-tests
        name: tools/checks tests (pre-push)
        entry: env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE python -m unittest discover -s tools/checks
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
