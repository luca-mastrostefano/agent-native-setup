[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-native-setup"
version = "0.1.0"
description = "Wizard that scaffolds an agentic-native project setup (AGENTS.md/CLAUDE.md, agents, docs/RFCs, linters, CI)."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "questionary>=2.0",
    "jinja2>=3.1",
    "rich>=13.0",
]

[project.scripts]
agent-native-setup = "agent_native_setup.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_native_setup"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "RUF"]

[tool.ruff.lint.per-file-ignores]
# Generators hold markdown/YAML templates as string literals; long content
# lines (e.g. the verbatim execution principles) are intentional.
"src/agent_native_setup/generators/*" = ["E501"]

[tool.pytest.ini_options]
# Scope pytest to tests/; the stdlib-unittest suite under tools/checks/ is run by
# `python -m unittest discover` (the same runner we ship) from the `test` task.
testpaths = ["tests"]
