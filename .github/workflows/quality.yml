name: quality
on:
  push:
    branches: [main]
  pull_request:

# Cancel a superseded run on the same PR; keep every push/main run (run_id is unique).
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pipx install ruff
      - run: ruff check .
      - run: ruff format --check .
      - run: python -m pip install -e . pytest ruff
      - run: pytest
      - run: python -m unittest discover -s tools/checks
      # The wheel must ship the pin and NOT the baseline bytes (RFC 2026-07-08): the engine
      # fetches `builtin:` by pin at runtime, so a force-include regression that either drops
      # the pin or re-embeds the baseline would break the packaging invariant unnoticed.
      - run: |
          python -m pip wheel --no-deps -w dist . -q
          python - <<'CHECK'
          import glob, zipfile
          names = zipfile.ZipFile(glob.glob("dist/agent_native_setup-*.whl")[0]).namelist()
          assert "agent_native_setup/baseline-pin.json" in names, "pin missing from wheel"
          assert not any("_baseline" in n for n in names), "baseline bytes must not ship"
          print("wheel ships the pin, not the baseline:", len(names), "files")
          CHECK
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # gitleaks-action lists PR commits via the API; 403s without it
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: .
      - uses: gitleaks/gitleaks-action@v3 # v3 = node24; v2 was the deprecated node20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # required to scan any pull_request
          GITLEAKS_ENABLE_COMMENTS: "false" # keep CI read-only (no pull-requests:write)
